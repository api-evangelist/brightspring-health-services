description: >-
  BrightSpring Health Services is a leading Fortune 500 provider of comprehensive
  home and community-based health services for complex populations. The company
  operates across three primary service lines: Provider Services (home health,
  rehabilitation, neurorehabilitation, personal care), Pharmacy Services (specialty
  infusion, home and community-based pharmacy dispensing over 40 million prescriptions
  annually), and Managed Care (home-based primary care with demonstrated 44%
  reduction in hospitalizations). BrightSpring operates multiple clinical brands
  including Adoration Home Health, Amerita specialty infusion, and All Ways Caring.
